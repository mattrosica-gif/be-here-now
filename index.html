<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Be Here Now">
  <title>Be Here Now</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #gate {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: opacity 0.4s ease;
    }

    .ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.4s ease, transform 0.15s ease;
    }

    #gate:active .ring {
      border-color: rgba(255, 255, 255, 0.65);
      transform: scale(0.93);
    }

    .ring-inner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    .label {
      color: rgba(255, 255, 255, 0.18);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

  </style>
</head>
<body>

  <div id="gate" onclick="enter()">
    <div class="ring">
      <div class="ring-inner"></div>
    </div>
    <span class="label">be here now</span>
  </div>

  <script>
    const VIDEO_ID = '9LEdEFUnIbA';

    function enter() {
      // Try YouTube app first, fall back to web
      window.location.href = `vnd.youtube://${VIDEO_ID}`;
      setTimeout(() => {
        window.location.href = `https://www.youtube.com/watch?v=${VIDEO_ID}`;
      }, 500);
    }
  </script>

</body>
</html>
